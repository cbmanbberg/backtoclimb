<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="oklch(0.93 0.012 74)" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="oklch(0.16 0.011 62)" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>BackToClimb</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Hanken Grotesk", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { height: 100%; }
    .btc-scroll::-webkit-scrollbar { display: none; }
    .btc-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
    input { font-family: inherit; }
    @keyframes btcFade { from { transform: translateY(4px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes btcSheet { from { transform: translateY(18px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes btcCelebrate { from { transform: scale(.96); opacity: 0; } to { transform: none; opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
